name: Deploy static pages to Aliyun

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-static-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      REMOTE_BASE_DIR: ${{ secrets.ALIYUN_REMOTE_BASE_DIR || '/usr/share/nginx' }}
      SSH_HOST: ${{ secrets.ALIYUN_HOST }}
      SSH_PORT: ${{ secrets.ALIYUN_PORT || '22' }}
      SSH_USER: ${{ secrets.ALIYUN_USER || 'root' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect website directories
        id: detect
        run: |
          set -euo pipefail

          mapfile -t all_web_dirs < <(
            find . -maxdepth 1 -mindepth 1 -type d \
              ! -name '.git' \
              ! -name '.github' \
              ! -name '.tmp_pdf' \
              ! -name 'scripts' \
              -printf '%f\n' | sort
          )

          if [[ "${#all_web_dirs[@]}" -eq 0 ]]; then
            echo "No website directories found."
            echo "dirs=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" || "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            selected_dirs=("${all_web_dirs[@]}")
          else
            declare -A web_dir_lookup=()
            declare -A selected_lookup=()
            selected_dirs=()

            for dir in "${all_web_dirs[@]}"; do
              web_dir_lookup["${dir}"]=1
            done

            while IFS= read -r path; do
              top_level="${path%%/*}"
              if [[ -n "${web_dir_lookup[${top_level}]:-}" && -z "${selected_lookup[${top_level}]:-}" ]]; then
                selected_lookup["${top_level}"]=1
                selected_dirs+=("${top_level}")
              fi
            done < <(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")
          fi

          if [[ "${#selected_dirs[@]}" -eq 0 ]]; then
            echo "No website directory changes detected. Skipping deploy."
            echo "dirs=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          printf 'Deploying changed directories: %s\n' "${selected_dirs[*]}"
          {
            echo "dirs<<EOF"
            printf '%s\n' "${selected_dirs[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Validate required secrets
        if: steps.detect.outputs.dirs != ''
        run: |
          set -euo pipefail
          test -n "${SSH_HOST}" || { echo "Missing secret: ALIYUN_HOST"; exit 1; }
          test -n "${SSH_USER}" || { echo "Missing secret: ALIYUN_USER"; exit 1; }
          test -n "${{ secrets.ALIYUN_SSH_PRIVATE_KEY }}" || { echo "Missing secret: ALIYUN_SSH_PRIVATE_KEY"; exit 1; }

      - name: Configure SSH key
        if: steps.detect.outputs.dirs != ''
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.ALIYUN_SSH_PRIVATE_KEY }}" > ~/.ssh/aliyun_deploy_key
          sed -i 's/\r$//' ~/.ssh/aliyun_deploy_key
          chmod 600 ~/.ssh/aliyun_deploy_key
          if ! ssh-keygen -y -f ~/.ssh/aliyun_deploy_key > /dev/null; then
            echo "ALIYUN_SSH_PRIVATE_KEY is not a valid OpenSSH private key."
            echo "Please paste the complete private key, including BEGIN/END lines, into the GitHub secret."
            exit 1
          fi
          ssh-keyscan -p "${SSH_PORT}" "${SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy website directories
        if: steps.detect.outputs.dirs != ''
        run: |
          set -euo pipefail

          ssh_opts=(-i ~/.ssh/aliyun_deploy_key -p "${SSH_PORT}")
          remote="${SSH_USER}@${SSH_HOST}"

          mapfile -t web_dirs <<< "${{ steps.detect.outputs.dirs }}"

          echo "Deploying directories: ${web_dirs[*]}"
          ssh "${ssh_opts[@]}" "${remote}" "mkdir -p '${REMOTE_BASE_DIR}'"

          remote_has_rsync=false
          if ssh "${ssh_opts[@]}" "${remote}" "command -v rsync >/dev/null 2>&1"; then
            remote_has_rsync=true
          fi

          for dir in "${web_dirs[@]}"; do
            remote_dir="${REMOTE_BASE_DIR}/${dir}"
            echo "Deploying ${dir}/ -> ${remote_dir}/"
            ssh "${ssh_opts[@]}" "${remote}" "mkdir -p '${remote_dir}'"

            if [[ "${remote_has_rsync}" == "true" ]]; then
              rsync -az --delete \
                --exclude '.DS_Store' \
                -e "ssh -i ~/.ssh/aliyun_deploy_key -p ${SSH_PORT}" \
                "${dir}/" "${remote}:${remote_dir}/"
            else
              echo "Remote rsync not found; falling back to tar over SSH."
              ssh "${ssh_opts[@]}" "${remote}" "find '${remote_dir}' -mindepth 1 -maxdepth 1 -exec rm -rf {} +"
              tar --exclude='.DS_Store' -C "${dir}" -cf - . | ssh "${ssh_opts[@]}" "${remote}" "tar -C '${remote_dir}' -xf -"
            fi
          done

      - name: Reload Nginx
        if: steps.detect.outputs.dirs != ''
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/aliyun_deploy_key -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" \
            "nginx -t && systemctl reload nginx"
